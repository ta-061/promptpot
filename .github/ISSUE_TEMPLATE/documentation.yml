name: Documentation improvement
description: Report missing, unclear, or incorrect documentation
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Link the section or name the file that should change.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is unclear, missing, or incorrect?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Suggested improvement
      description: Describe the content or example that would resolve the problem.
    validations:
      required: true
